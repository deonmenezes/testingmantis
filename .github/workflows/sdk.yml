name: sdk

on:
  workflow_call:

jobs:
  python-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Test Python SDK
        shell: bash
        run: |
          set -euo pipefail

          # Run inside a glibc Linux image so dependency resolution exercises
          # the pinned manylinux runtime wheel that users install.
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/codex-python-sdk-home \
            -e UV_LINK_MODE=copy \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            -w "${GITHUB_WORKSPACE}/sdk/python" \
            python:3.12-slim \
            sh -euxc '
              python -m venv /tmp/uv
              /tmp/uv/bin/python -m pip install uv==0.11.3
              /tmp/uv/bin/uv sync --group dev --frozen
              /tmp/uv/bin/uv run --frozen --no-sync ruff check --output-format=github .
              /tmp/uv/bin/uv run --frozen --no-sync ruff format --check .
              /tmp/uv/bin/uv run --frozen --no-sync pytest
            '

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree

  sdks:
    # Upstream builds the `codex` binary via Bazel + a BuildBuddy remote
    # cache on a custom self-hosted runner group. None of that exists on
    # this fork, so this job builds it with plain `cargo build --release`
    # on a standard runner instead -- slower (no remote cache), but it
    # doesn't need any infrastructure beyond what GitHub already provides.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Install Linux bwrap build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      # A cold release build of this workspace takes well over an hour with
      # no cache at all; without OpenAI's BuildBuddy remote cache, a plain
      # actions/cache of ~/.cargo and target/release is the next best thing.
      - name: Cache Cargo registry and build output
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            codex-rs/target/release
          key: sdk-cargo-release-${{ runner.os }}-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            sdk-cargo-release-${{ runner.os }}-

      - name: Build codex with Cargo
        shell: bash
        working-directory: codex-rs
        run: cargo build --release -p codex-cli

      - name: Stage codex binary
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${GITHUB_WORKSPACE}/.tmp/sdk-ci"
          mkdir -p "${install_dir}"
          install -m 755 "${GITHUB_WORKSPACE}/codex-rs/target/release/codex" "${install_dir}/codex"
          echo "CODEX_EXEC_PATH=${install_dir}/codex" >> "$GITHUB_ENV"

      - name: Warm up codex
        shell: bash
        run: |
          set -euo pipefail
          "${CODEX_EXEC_PATH}" --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK packages
        run: pnpm -r --filter ./sdk/typescript run build

      - name: Lint SDK packages
        run: pnpm -r --filter ./sdk/typescript run lint

      - name: Test SDK packages
        run: pnpm -r --filter ./sdk/typescript run test

      - name: Check for a clean worktree
        if: always() && !cancelled()
        uses: ./.github/actions/check-clean-worktree
